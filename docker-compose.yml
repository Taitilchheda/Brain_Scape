version: "3.9"

services:
  # ── API Server ──
  brainscape-api:
    build:
      context: .
      dockerfile: mlops/serve/Dockerfile
    command: uvicorn mlops.serve.api:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://brainscape:brainscape@postgres:5432/brainscape
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=brainscape-scans
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./:/app
      - ./data/atlases:/app/data/atlases:ro

  # ── Celery Worker (CPU-bound tasks: ingestion, LLM, etc.) ──
  brainscape-worker-cpu:
    build:
      context: .
      dockerfile: mlops/serve/Dockerfile
    command: celery -A mlops.serve.task_queue worker --loglevel=info --concurrency=4 -Q cpu
    environment:
      - DATABASE_URL=postgresql://brainscape:brainscape@postgres:5432/brainscape
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=brainscape-scans
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./:/app
      - ./data/atlases:/app/data/atlases:ro

  # ── Celery Worker (GPU-bound tasks: nnU-Net, classification) ──
  brainscape-worker-gpu:
    build:
      context: .
      dockerfile: mlops/serve/Dockerfile
    command: celery -A mlops.serve.task_queue worker --loglevel=info --concurrency=2 -Q gpu
    environment:
      - DATABASE_URL=postgresql://brainscape:brainscape@postgres:5432/brainscape
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=brainscape-scans
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./:/app
      - ./data/atlases:/app/data/atlases:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: brainscape
      POSTGRES_USER: brainscape
      POSTGRES_PASSWORD: brainscape
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Redis (Job Queue + Result Backend) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── MinIO (S3-compatible Object Store) ──
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── MLflow (Experiment Tracking) ──
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary &&
               mlflow server
               --backend-store-uri postgresql://brainscape:brainscape@postgres:5432/mlflow
               --default-artifact-root s3://brainscape-scans/mlflow
               --host 0.0.0.0
               --port 5000"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - minio

  # ── Prometheus (Metrics) ──
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./mlops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── Grafana (Dashboards) ──
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./mlops/monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/brainscape.json:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  minio_data: