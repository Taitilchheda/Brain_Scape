<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="640" viewBox="0 0 1320 640">
    <style>
      .t { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
