<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="740" viewBox="0 0 1240 740">

    <style>
      .bg { fill: #F8FBFF; }
      .panel { fill: #E8F2FB; stroke: #1F2A37; stroke-width: 2; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #101418; }
      .subtitle { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #556070; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #101418; }
      .small { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #556070; }
      .value { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #101418; }
      .axis { stroke: #6B7280; stroke-width: 1.5; }
      .grid { stroke: #D1D5DB; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
    

<rect class="bg" x="0" y="0" width="1240" height="740"/>
<text x="70" y="65" class="title">Comparison Chart: Exemplar Cases (Bubble)</text>
<text x="70" y="95" class="subtitle">Triage vs burden with confidence as bubble size</text>
<line x1="120.0" y1="130" x2="120.0" y2="650" class="grid"/>
<text x="120.0" y="678" class="small" text-anchor="middle">0</text>
<line x1="324.8" y1="130" x2="324.8" y2="650" class="grid"/>
<text x="324.8" y="678" class="small" text-anchor="middle">5</text>
<line x1="529.5" y1="130" x2="529.5" y2="650" class="grid"/>
<text x="529.5" y="678" class="small" text-anchor="middle">10</text>
<line x1="734.3" y1="130" x2="734.3" y2="650" class="grid"/>
<text x="734.3" y="678" class="small" text-anchor="middle">15</text>
<line x1="939.0" y1="130" x2="939.0" y2="650" class="grid"/>
<text x="939.0" y="678" class="small" text-anchor="middle">20</text>
<line x1="120" y1="650.0" x2="980" y2="650.0" class="grid"/>
<text x="108" y="655.0" class="small" text-anchor="end">0</text>
<line x1="120" y1="513.2" x2="980" y2="513.2" class="grid"/>
<text x="108" y="518.2" class="small" text-anchor="end">5000</text>
<line x1="120" y1="376.3" x2="980" y2="376.3" class="grid"/>
<text x="108" y="381.3" class="small" text-anchor="end">10000</text>
<line x1="120" y1="239.5" x2="980" y2="239.5" class="grid"/>
<text x="108" y="244.5" class="small" text-anchor="end">15000</text>
<line x1="120" y1="650" x2="980" y2="650" class="axis"/>
<line x1="120" y1="130" x2="120" y2="650" class="axis"/>
<circle cx="934.1" cy="153.8" r="31.6" fill="#E74C3C" fill-opacity="0.65" stroke="#243447" stroke-width="2"/>
<text x="934.1" y="112.2" class="label" text-anchor="middle">High</text>
<circle cx="405.8" cy="462.4" r="31.6" fill="#F39C12" fill-opacity="0.65" stroke="#243447" stroke-width="2"/>
<text x="405.8" y="420.8" class="label" text-anchor="middle">Moderate</text>
<circle cx="215.8" cy="612.2" r="24.3" fill="#27AE60" fill-opacity="0.65" stroke="#243447" stroke-width="2"/>
<text x="215.8" y="577.9" class="label" text-anchor="middle">Low</text>
<text x="550.0" y="710" class="label" text-anchor="middle">Triage Score</text>
<text x="40" y="390.0" class="label" transform="rotate(-90 40,390.0)" text-anchor="middle">Flagged Volume (mm3)</text>
<circle cx="1020" cy="210" r="10" fill="#E74C3C"/>
<text x="1040" y="216" class="label">High</text>
<circle cx="1020" cy="256" r="10" fill="#F39C12"/>
<text x="1040" y="262" class="label">Moderate</text>
<circle cx="1020" cy="302" r="10" fill="#27AE60"/>
<text x="1040" y="308" class="label">Low</text>
<text x="1010" y="180" class="small">Bubble size ∝ confidence</text>
</svg>
