<circle cx="970" cy="320" r="101" stroke="#0D9488" stroke-width="38" fill="none" stroke-dasharray="634.60 634.60" transform="rotate(-90 970 320)"/>
<text x="970" y="314" class="t" text-anchor="middle">100.0%</text>
<text x="970" y="344" class="sm" text-anchor="middle">Audit completeness</text>
