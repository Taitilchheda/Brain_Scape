<rect class="panel" x="690" y="120" width="560" height="470" rx="16"/>
<rect x="170" y="212.3" width="160" height="297.7" fill="#16A34A"/>
<rect x="170" y="190.0" width="160" height="22.3" fill="#DC2626"/>
<rect x="170" y="190" width="160" height="320" fill="none" stroke="#334155"/>
<text x="380" y="250" class="l">Allowed: 400</text>
<text x="380" y="286" class="l">Denied: 30</text>
<text x="380" y="322" class="sm">Total events: 430</text>
<text x="380" y="356" class="sm">Unauthorized block rate: 100.0%</text>
