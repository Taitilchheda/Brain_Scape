<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="640" viewBox="0 0 1320 640">
    <style>
      .t { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .s { font: 600 19px 'Segoe UI', Arial, sans-serif; fill: #4B5563; }
      .l { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .v { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .sm { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #4B5563; }
      .panel { fill: #E7F1FB; stroke: #1F2937; stroke-width: 1.8; }
      .axis { stroke: #6B7280; stroke-width: 1.4; }
      .grid { stroke: #D1D5DB; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
    
<rect x="0" y="0" width="1320" height="640" fill="#F8FBFF"/>
