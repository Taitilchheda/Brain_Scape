<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="650" viewBox="0 0 1240 650">

    <style>
      .bg { fill: #F8FBFF; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #111827; }
