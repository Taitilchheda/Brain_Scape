<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">

    <style>
      .bg { fill: #F8FBFF; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #4B5563; }
      .label { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .value { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #4B5563; }
      .panel { fill: #E7F1FB; stroke: #1F2937; stroke-width: 1.6; }
      .axis { stroke: #6B7280; stroke-width: 1.4; }
      .grid { stroke: #D1D5DB; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
    
<rect class="bg" x="0" y="0" width="1400" height="620"/>
<text x="50" y="54" class="title">Final Core Metrics with 95% CI</text>
<text x="50" y="84" class="subtitle">Bootstrap 5000 confidence intervals from publication cohort</text>
<rect class="panel" x="50" y="110" width="1300" height="56" rx="10"/>
<text x="70" y="145" class="label">Metric</text>
<text x="700" y="145" class="label">Mean</text>
<text x="930" y="145" class="label">95% CI low</text>
<text x="1140" y="145" class="label">95% CI high</text>
<rect x="50" y="166" width="1300" height="52" fill="#FFFFFF" stroke="#D1D9E6"/>
<text x="70" y="200" class="label">Overall confidence</text>
<text x="700" y="200" class="value">0.723</text>
<text x="930" y="200" class="value">0.715</text>
<text x="1140" y="200" class="value">0.729</text>
<rect x="50" y="218" width="1300" height="52" fill="#F2F7FD" stroke="#D1D9E6"/>
<text x="70" y="252" class="label">Triage score</text>
<text x="700" y="252" class="value">8.19</text>
<text x="930" y="252" class="value">6.56</text>
<text x="1140" y="252" class="value">9.91</text>
<rect x="50" y="270" width="1300" height="52" fill="#FFFFFF" stroke="#D1D9E6"/>
<text x="70" y="304" class="label">Flagged regions</text>
<text x="700" y="304" class="value">3.12</text>
<text x="930" y="304" class="value">2.51</text>
<text x="1140" y="304" class="value">3.78</text>
<rect x="50" y="322" width="1300" height="52" fill="#F2F7FD" stroke="#D1D9E6"/>
<text x="70" y="356" class="label">Severe regions</text>
<text x="700" y="356" class="value">1.06</text>
<text x="930" y="356" class="value">0.69</text>
<text x="1140" y="356" class="value">1.45</text>
<rect x="50" y="374" width="1300" height="52" fill="#FFFFFF" stroke="#D1D9E6"/>
<text x="70" y="408" class="label">Flagged volume mm3</text>
<text x="700" y="408" class="value">6939.2</text>
<text x="930" y="408" class="value">5310.7</text>
<text x="1140" y="408" class="value">8662.1</text>
<rect x="50" y="426" width="1300" height="52" fill="#F2F7FD" stroke="#D1D9E6"/>
<text x="70" y="460" class="label">Severe volume mm3</text>
<text x="700" y="460" class="value">3113.6</text>
<text x="930" y="460" class="value">2016.9</text>
<text x="1140" y="460" class="value">4308.9</text>
<rect x="50" y="478" width="1300" height="52" fill="#FFFFFF" stroke="#D1D9E6"/>
<text x="70" y="512" class="label">Mean region confidence pct</text>
<text x="700" y="512" class="value">78.42</text>
<text x="930" y="512" class="value">74.60</text>
<text x="1140" y="512" class="value">81.85</text>
<rect x="50" y="530" width="1300" height="52" fill="#F2F7FD" stroke="#D1D9E6"/>
<text x="70" y="564" class="label">Highest region burden pct</text>
<text x="700" y="564" class="value">25.39</text>
<text x="930" y="564" class="value">23.61</text>
<text x="1140" y="564" class="value">27.21</text>
</svg>
